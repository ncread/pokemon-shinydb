<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShinyDex — Track Your Shiny Hunts</title>
    <link rel="stylesheet" href="css/style.css">

    <link rel="icon" type="image/png" href="/assets/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/assets/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/assets/favicon/site.webmanifest" />
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Subtle animated star-field */
        #stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .star {
            position: absolute;
            border-radius: 50%;
            background: #fff;
            animation: twinkle var(--dur, 3s) ease-in-out infinite;
            animation-delay: var(--del, 0s);
        }
        @keyframes twinkle {
            0%,100% { opacity: var(--lo, 0.08); transform: scale(1); }
            50%      { opacity: var(--hi, 0.7);  transform: scale(1.3); }
        }

        /* Ambient glow orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            z-index: 0;
            pointer-events: none;
            animation: drift 9s ease-in-out infinite;
        }
        .orb-gold {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(232,184,64,0.07) 0%, transparent 70%);
            top: -160px; right: -140px;
        }
        .orb-teal {
            width: 380px; height: 380px;
            background: radial-gradient(circle, rgba(56,200,168,0.055) 0%, transparent 70%);
            bottom: -100px; left: -80px;
            animation-delay: -4.5s;
        }
        @keyframes drift {
            0%,100% { transform: translateY(0px); }
            50%      { transform: translateY(-22px); }
        }

        /* Auth card */
        .auth-wrap {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            padding: 1rem;
        }

        .auth-brand {
            text-align: center;
            margin-bottom: 1.75rem;
        }
        .auth-brand h1 {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            background: linear-gradient(130deg, var(--gold) 0%, var(--gold-bright) 45%, var(--teal) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .auth-brand p {
            color: var(--text-secondary);
            font-size: 0.87rem;
            margin-top: 0.3rem;
        }

        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border-accent);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 10px 50px rgba(0,0,0,0.55),
                        0 0 0 1px rgba(232,184,64,0.04);
        }

        .auth-tabs { display:flex; border-bottom: 1px solid var(--border); }
        .auth-tab {
            flex: 1;
            padding: 0.85rem;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            border: none;
            background: none;
            font-family: 'Outfit', sans-serif;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .auth-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

        .auth-form { padding: 1.6rem; display: none; }
        .auth-form.active { display: block; }

        .auth-submit { width:100%; padding:0.72rem; margin-top:0.3rem; font-size:0.93rem; }

        .auth-foot {
            text-align: center;
            padding: 0.9rem;
            font-size: 0.76rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <div id="stars"></div>
    <div class="orb orb-gold"></div>
    <div class="orb orb-teal"></div>

    <div class="auth-wrap">
        <div class="auth-brand">
            <h1>✨ Pokémon Shiny Hunt Database</h1>
            <p>Track your shiny Pokémon hunts — Gen 2-5</p>
        </div>

        <div class="auth-card">
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">Log In</button>
                <button class="auth-tab"        onclick="switchTab('signup')">Sign Up</button>
            </div>

            <!-- LOGIN -->
            <div class="auth-form active" id="form-login">
                <div id="login-alert"></div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="login-email"
                           placeholder="trainer@example.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="login-password"
                           placeholder="••••••••">
                </div>
                <button class="btn btn-primary auth-submit" onclick="handleLogin()">Log In</button>
            </div>

            <!-- SIGN UP -->
            <div class="auth-form" id="form-signup">
                <div id="signup-alert"></div>
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-input" id="signup-username"
                           placeholder="ShinyHunter99">
                    <span class="form-hint">Letters, numbers, and underscores only</span>
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="signup-email"
                           placeholder="trainer@example.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="signup-password"
                           placeholder="Min. 6 characters">
                </div>
                <button class="btn btn-primary auth-submit" onclick="handleSignup()">Create Account</button>
            </div>

            <!-- <div class="auth-foot">Powered by Supabase · Hosted on GitHub Pages</div> -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // ── Star field ──────────────────────────────────
        const starsEl = document.getElementById('stars');
        for (let i = 0; i < 90; i++) {
            const s = document.createElement('div');
            const sz = Math.random() * 2.2 + 0.4;
            s.className = 'star';
            s.style.cssText = `
                width:${sz}px; height:${sz}px;
                left:${Math.random()*100}%;
                top:${Math.random()*100}%;
                --dur:${(Math.random()*4+2).toFixed(1)}s;
                --del:-${(Math.random()*5).toFixed(1)}s;
                --lo:${(Math.random()*0.12).toFixed(2)};
                --hi:${(Math.random()*0.55+0.25).toFixed(2)};
            `;
            starsEl.appendChild(s);
        }

        // ── Tab switching ────────────────────────────────
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach((t, i) => {
                t.classList.toggle('active',
                    (tab === 'login' && i === 0) || (tab === 'signup' && i === 1));
            });
            document.getElementById('form-login').classList.toggle('active', tab === 'login');
            document.getElementById('form-signup').classList.toggle('active', tab === 'signup');
        }

        function showAlert(id, msg, type = 'error') {
            document.getElementById(id).innerHTML =
                `<div class="alert alert-${type}">${msg}</div>`;
        }

        // ── Login ────────────────────────────────────────
        async function handleLogin() {
            const email    = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            if (!email || !password)
                return showAlert('login-alert', 'Please fill in all fields.');
            try {
                await signIn(email, password);
                window.location.href = 'dashboard.html';
            } catch (e) {
                showAlert('login-alert', e.message);
            }
        }

        // ── Sign up ──────────────────────────────────────
        async function handleSignup() {
            const username = document.getElementById('signup-username').value.trim();
            const email    = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            if (!username || !email || !password)
                return showAlert('signup-alert', 'Please fill in all fields.');
            try {
                await signUp(email, password, username);
                window.location.href = 'dashboard.html';
            } catch (e) {
                showAlert('signup-alert', e.message);
            }
        }

        // ── Enter key support ────────────────────────────
        document.addEventListener('keydown', e => {
            if (e.key !== 'Enter') return;
            const active = document.querySelector('.auth-form.active').id;
            if (active === 'form-login') handleLogin();
            else handleSignup();
        });

        // Redirect to dashboard if already logged in
        redirectIfAuth();
    </script>
</body>
</html>
